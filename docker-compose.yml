services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    image: compiler-for-dark:dev
    container_name: compiler-dev

    # Volume mounts
    volumes:
      # Source code (editable from host) - matches host path
      - /Users/paulbiggar/projects/c4d:/Users/paulbiggar/projects/c4d:cached

      # Codex configuration and session data
      - ~/.codex:/home/dark/.codex:cached
      # Claude configuration and session data
      - ~/.claude:/home/dark/.claude:cached

      # Persist .NET packages across container restarts
      - dotnet-packages:/home/dark/.nuget/packages

    working_dir: /Users/paulbiggar/projects/c4d

    # Environment variables
    environment:
      - DOTNET_ROOT=/usr/share/dotnet
      - DOTNET_MULTILEVEL_LOOKUP=0
      - DOTNET_CLI_TELEMETRY_OPTOUT=1
      - DOTNET_NOLOGO=1

    # Keep container running
    stdin_open: true
    tty: true

    # Platform
    platform: linux/arm64

volumes:
  dotnet-packages:
